# .github/workflows/build_windows.yml
name: Build Windows EXE

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Add Windows platform support
        run: flutter create --platforms=windows .

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

      - name: Find cmake path
        run: |
          $cmakePath = (Get-Command cmake).Source
          echo "CMAKE_PATH=$cmakePath"
          cmake --version

      - name: Build Windows EXE
        run: |
          $vsPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath
          Write-Host "VS Path: $vsPath"
          $env:CMAKE_GENERATOR = "Visual Studio 17 2022"
          $env:CMAKE_GENERATOR_PLATFORM = "x64"
          flutter build windows --release

      - name: Package as ZIP
        run: |
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath pharmacy_app_windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pharmacy-app-windows
          path: build\windows\x64\runner\Release\
          retention-days: 30

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: pharmacy_app_windows.zip
