# .github/workflows/build_windows.yml
name: Build Windows EXE

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Add Windows platform support
        run: flutter create --platforms=windows .

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

      - name: Install Visual Studio Build Tools
        run: |
          choco install visualstudio2022buildtools `
            --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended" `
            -y --no-progress

      - name: Build Windows EXE
        run: flutter build windows --release

      - name: Package as ZIP
        run: |
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath pharmacy_app_windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pharmacy-app-windows
          path: build\windows\x64\runner\Release\
          retention-days: 30

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: pharmacy_app_windows.zip
